<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TixSnip — Shared Collection</title>
<meta name="description" content="A shared ticket-stub collection on TixSnip." />
<style>
  :root{--ink:#1E1A4A;--paper:#F0E8D0;--accent:#CE1141;--gold:#D4AF37;--bg:#F5F5F5;--card-radius:14px;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px 48px;}
  header{position:sticky;top:0;z-index:5;background:var(--ink);padding:calc(env(safe-area-inset-top) + 16px) 16px 16px;color:#fff;}
  .brand{display:flex;align-items:center;gap:8px;justify-content:center;}
  .brand-logo{width:26px;height:26px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;}
  .brand-name{font-weight:800;letter-spacing:.5px;font-size:18px;}
  .collection-name{text-align:center;font-size:22px;font-weight:900;margin:14px 0 2px;}
  .collection-sub{text-align:center;font-size:13px;color:rgba(255,255,255,.75);}
  .openbar{max-width:640px;margin:14px auto 0;padding:0 16px;}
  .openbtn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;font-weight:800;font-size:15px;padding:13px;border-radius:10px;border:none;width:100%;cursor:pointer;letter-spacing:.3px;}
  .openhint{text-align:center;font-size:12px;color:#8a8597;margin-top:8px;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px;color:#6b6680;}
  .spinner{width:34px;height:34px;border:3px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .center h2{color:var(--ink);margin:8px 0 6px;font-size:20px;}
  .center p{margin:0;font-size:14px;max-width:320px;line-height:1.5;}
  .list{margin-top:18px;display:flex;flex-direction:column;gap:14px;}
  .card{border-radius:var(--card-radius);overflow:hidden;position:relative;box-shadow:0 2px 6px rgba(0,0,0,.12);}
  .card.post{border:2.5px solid var(--gold);box-shadow:0 0 10px rgba(212,175,55,.45);}
  .card-grad{padding:18px 18px 18px 86px;min-height:122px;position:relative;}
  .badge-logo{position:absolute;top:14px;left:14px;width:58px;height:58px;border-radius:29px;display:flex;align-items:center;justify-content:center;font-size:26px;border:1px solid rgba(255,255,255,.6);box-shadow:0 2px 4px rgba(0,0,0,.25);}
  .post-ribbon{display:inline-block;background:var(--gold);color:var(--ink);font-size:10px;font-weight:900;letter-spacing:.8px;padding:3px 8px;border-radius:4px;margin-bottom:8px;}
  .etype{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:1px;margin-bottom:6px;text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .ctitle{font-size:21px;font-weight:800;color:#fff;line-height:1.25;margin:0 0 10px;text-shadow:0 1px 3px rgba(0,0,0,.4);}
  .crow{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.95);font-size:13.5px;margin-top:4px;text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .crow svg{flex:0 0 auto;opacity:.95;}
  footer{text-align:center;font-size:12px;color:#9a95a8;margin-top:32px;line-height:1.6;}
  footer a{color:var(--accent);font-weight:700;}
</style>
</head>
<body>
  <header>
    <div class="brand"><div class="brand-logo">T</div><div class="brand-name">TixSnip</div></div>
    <div id="collName" class="collection-name" style="display:none;"></div>
    <div id="collSub" class="collection-sub" style="display:none;"></div>
  </header>
  <div id="openbar" class="openbar" style="display:none;">
    <button class="openbtn" id="openBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Open in TixSnip to save these</button>
    <div class="openhint">Have the app? Tap to add tickets to your own timeline. Don't have it? Browse below.</div>
  </div>
  <div class="wrap">
    <div id="content"><div class="center"><div class="spinner"></div><p>Loading collection…</p></div></div>
    <footer id="footer" style="display:none;"></footer>
  </div>
<script>
var PROJECT='tixsnip';
var API_KEY='AIzaSyC_byzqRqpHMrBAeNsyWPp2gv1BN19FClo';
var REST='https://firestore.googleapis.com/v1/projects/'+PROJECT+'/databases/(default)/documents';
var APP_SCHEME='tixsnip://c/';
function decode(v){if(v==null)return null;if('stringValue' in v)return v.stringValue;if('integerValue' in v)return Number(v.integerValue);if('doubleValue' in v)return v.doubleValue;if('booleanValue' in v)return v.booleanValue;if('timestampValue' in v)return v.timestampValue;if('nullValue' in v)return null;if('mapValue' in v)return decodeFields(v.mapValue.fields||{});if('arrayValue' in v)return (v.arrayValue.values||[]).map(decode);return null;}
function decodeFields(f){var o={};for(var k in f)o[k]=decode(f[k]);return o;}
async function fetchDoc(path){var res=await fetch(REST+'/'+path+'?key='+API_KEY);if(res.status===404)return null;if(!res.ok)throw new Error('HTTP '+res.status);var json=await res.json();return decodeFields(json.fields||{});}
var POST_RE=/\b(playoff|championship|super bowl|world series|finals|stanley cup|bowl|march madness|final four|elite eight|sweet 16|wild ?card|alcs|nlcs|alds|nlds|conference final|cfp|college football playoff|regional)\b/;
var POST_EXCL=/(spring training|daytona 500|nascar|all[- ]?star|preseason|exhibition)/;
function lc(x){return (x||'').toString().toLowerCase();}
function isPost(e){var text=lc(e.tournamentName)+' '+lc(e.title)+' '+lc(e.matchup)+' '+lc(e.artistOrTeam);var ex=POST_EXCL.test(text+' '+lc(e.league)+' '+lc(e.venue));return !ex&&(!!e.tournamentName||POST_RE.test(text));}
function postLabel(e){var t=lc(e.tournamentName)+' '+lc(e.title)+' '+lc(e.matchup)+' '+lc(e.artistOrTeam);if(/super bowl/.test(t))return 'SUPER BOWL';if(/world series/.test(t))return 'WORLD SERIES';if(/stanley cup/.test(t))return 'STANLEY CUP';if(/nba finals|finals/.test(t))return 'FINALS';if(/final four|march madness|elite eight|sweet 16|regional|ncaa tournament/.test(t))return 'MARCH MADNESS';if(/bowl|cfp|college football playoff/.test(t))return 'BOWL GAME';if(/championship/.test(t))return 'CHAMPIONSHIP';if(/playoff|wild ?card|alcs|nlcs|alds|nlds|conference final/.test(t))return 'PLAYOFFS';return 'POSTSEASON';}
function gradientFor(e){if(e.eventType==='concert')return ['#A78BFA','#7C3AED'];var lg=lc(e.league);var m={mlb:['#1F8A4C','#0B5C30'],milb:['#1F8A4C','#0B5C30'],nfl:['#6B3537','#3B1717'],'college-football':['#6B3537','#3B1717'],ncaafb:['#6B3537','#3B1717'],nba:['#E0890B','#92400E'],wnba:['#E0890B','#92400E'],'mens-college-basketball':['#E0890B','#92400E'],'womens-college-basketball':['#E0890B','#92400E'],nhl:['#2B5BD7','#1E3A8A'],mls:['#1FA055','#14532D'],epl:['#1FA055','#14532D'],soccer:['#1FA055','#14532D'],nascar:['#C0392B','#7B241C'],pga:['#15803D','#0B5C30']};return m[lg]||['#60A5FA','#3B82F6'];}
function iconFor(e){if(e.eventType==='concert')return '🎵';var lg=lc(e.league);if(lg.indexOf('mlb')>=0||lg.indexOf('milb')>=0)return '⚾';if(lg.indexOf('nfl')>=0||lg.indexOf('football')>=0)return '🏈';if(lg.indexOf('basketball')>=0||lg==='nba'||lg==='wnba')return '🏀';if(lg==='nhl')return '🏒';if(['mls','epl','soccer','la_liga','serie_a','bundesliga','ligue_1','champions_league'].indexOf(lg)>=0)return '⚽';if(lg==='nascar')return '🏁';if(lg==='pga')return '⛳';return '🎟️';}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
var pinSvg='<svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,.95)"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>';
var calSvg='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.95)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
function cardHTML(e){var title=e.tournamentName||(e.isMultiEvent?e.title:(e.matchup||e.artistOrTeam))||'Event';var g=gradientFor(e);var g1=g[0],g0=g[1];var post=isPost(e);var etype=e.isMultiEvent?(e.eventType==='sports'?('🏆 '+((e.subEvents||[]).length)+' GAMES'):('🎵 '+((e.subEvents||[]).length)+' ARTISTS')):(e.eventType==='concert'?'🎵 CONCERT':'🏟️ GAME');var isC=e.eventType==='concert';var bb=isC?'rgba(30,26,74,.92)':'rgba(255,255,255,.95)';var loc=e.city?(esc(e.city)+(e.state?', '+esc(e.state):'')):'';return '<div class="card'+(post?' post':'')+'"><div class="card-grad" style="background:linear-gradient(90deg,'+g0+','+g1+');"><div class="badge-logo" style="background:'+bb+';">'+iconFor(e)+'</div>'+(post?'<div class="post-ribbon">★ '+postLabel(e)+'</div><br>':'')+'<div class="etype">'+etype+'</div><div class="ctitle">'+esc(title)+'</div>'+(e.venue?'<div class="crow">'+pinSvg+'<span>'+esc(e.venue)+'</span></div>':'')+(loc?'<div class="crow">'+pinSvg+'<span>'+loc+'</span></div>':'')+(e.dateString?'<div class="crow">'+calSvg+'<span>'+esc(e.dateString)+'</span></div>':'')+'</div></div>';}
function tryOpenApp(id){var url=APP_SCHEME+id;var f=document.createElement('iframe');f.style.display='none';f.src=url;document.body.appendChild(f);setTimeout(function(){try{document.body.removeChild(f);}catch(_){}}, 1500);window.location.href=url;}
function getShareId(){var h=(location.hash||'').replace(/^#\/?/,'').trim();if(h)return h.split(/[?&/]/)[0];var qs=new URLSearchParams(location.search);return (qs.get('c')||'').trim();}
function showState(html){document.getElementById('content').innerHTML=html;}
async function main(){var id=getShareId();if(!id){showState('<div class="center"><h2>No collection specified</h2><p>This link is missing its collection ID. Ask your friend to re-share from the TixSnip app.</p></div>');return;}var meta;try{meta=await fetchDoc('shared_collections/'+encodeURIComponent(id));}catch(err){showState('<div class="center"><h2>Could not load collection</h2><p>Something went wrong reaching TixSnip. Check your connection and try again.</p></div>');return;}if(!meta){showState('<div class="center"><h2>Collection not found</h2><p>This collection may have been unshared, or the link is incomplete. Ask your friend to re-share it from the TixSnip app.</p></div>');return;}var name=meta.displayName||'Shared Collection';var count=(meta.eventCount!=null)?meta.eventCount:null;var nameEl=document.getElementById('collName');var subEl=document.getElementById('collSub');nameEl.textContent=name;nameEl.style.display='block';if(count!=null){subEl.textContent=count+' '+(count===1?'ticket':'tickets');subEl.style.display='block';}var bar=document.getElementById('openbar');bar.style.display='block';document.getElementById('openBtn').addEventListener('click',function(){tryOpenApp(id);});var pageCount=meta.pageCount||1;var events=[];try{for(var i=0;i<pageCount;i++){var page=await fetchDoc('shared_collections/'+encodeURIComponent(id)+'/pages/'+i);if(page&&Array.isArray(page.events))events.push.apply(events,page.events);}}catch(_){}if(events.length===0){showState('<div class="center"><h2>'+esc(name)+'</h2><p>This collection does not have any tickets to show yet.</p></div>');return;}showState('<div class="list">'+events.map(cardHTML).join('')+'</div>');var f=document.getElementById('footer');f.style.display='block';f.innerHTML='Shared from <strong>TixSnip</strong> — your live ticket-stub collection.';}
main();
</script>
</body>
</html>
